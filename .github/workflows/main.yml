name: Sync from upstream

on:
  schedule:
    - cron: "0 0 * * *"  # 每天一次
  workflow_dispatch:     # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/ethgan/CF-Worker-BestIP-collector.git
          git fetch upstream

      - name: Merge upstream
        run: |
          git checkout main
          git merge upstream/main

      - name: Push changes
        run: |
          git push origin main
